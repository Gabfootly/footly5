<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Footly – Calcola la tua taglia</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 600px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h1, h2, h3 {
  text-align: center;
  color: #2c3e50;
}
p {
  color:#333;
  line-height:1.4em;
}
label, select, input {
  display:block;
  width:100%;
  margin-bottom:1em;
  font-size:1em;
}
button {
  width:100%;
  padding:12px;
  background:#27ae60;
  color:white;
  font-size:1.1em;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover {
  background:#219150;
}
#result {
  margin-top:20px;
  font-size:1.1em;
  font-weight:bold;
  text-align:center;
}
.small {
  font-size:0.9em;
  color:#666;
  text-align:center;
}
.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius:10px;
  margin-bottom:20px;
}
.video-wrapper iframe {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
img {
  max-width:100%;
  border-radius:10px;
  margin:20px 0;
}
</style>

</head>

<body>
<div class="container">

<img src="logo footly.png" alt="Footly Logo" style="max-width:200px; display:block; margin:0 auto 10px auto;" />
<!-- ✅ Placeholder nascosti per compatibilità con script.protetto.js (NON toccano la grafica) -->
<div style="display:none;">
  <label>Lingua / Language</label>
  <select id="language">
    <option value="it">Italiano</option>
    <option value="en">English</option>
  </select>

  <h1 id="hero-title"></h1>
  <p id="hero-sub"></p>
  <p id="hero-small"></p>

  <h2 id="why-title"></h2>
  <div id="why-1"></div>
  <div id="why-2"></div>
  <div id="why-3"></div>

  <h2 id="prices-title"></h2>
  <div id="plan-small"></div>
  <div id="plan-pro"></div>

  <h2 id="demo-title"></h2>
  <p id="demo-sub"></p>
  <p id="demo-note"></p>

  <span id="footer-text"></span>

  <a id="btn-demo"></a>
  <a id="btn-contact"></a>

  <div id="footly-privacy"></div>
  <div id="testimonial-heading"></div>
</div>
<h1>Calcola la tua taglia in 1 minuto</h1>
<p class="small">Guarda il video, poi usa il misuratore qui sotto.</p>

<!-- VIDEO VIMEO -->
<div class="video-wrapper">
  <iframe
    src="https://player.vimeo.com/video/1158228058"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<h3>Come prendere le misure</h3>
<img src="example.png" alt="Come misurare il piede" />
<p class="small">Misura entrambi i piedi e inserisci la misura del più lungo.</p>

<hr style="margin:25px 0;">

<h2>Prova ora il misuratore</h2>


  <label id="lbl-gender">Sesso</label>
  <select id="gender">
    <option value="male">Uomo</option>
    <option value="female">Donna</option>
  </select>

  <label id="lbl-length">Lunghezza piede (cm)</label>
  <input type="number" id="foot-length" min="20" max="32" step="0.1"/>

  <label id="lbl-width">Larghezza piede (cm)</label>
  <input type="number" id="foot-width" min="7" max="14" step="0.1"/>

  <button id="calculate-button" type="button" onclick="calcolaTaglia()">Calcola taglia</button>
  <div id="result"></div>

  <p class="small">Demo gratuita – nessun dato raccolto</p>
</div>

<script src="script.protetto.js"></script>

</body>
</html>
