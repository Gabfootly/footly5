<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Footly – Calcola la tua taglia</title>

<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
.container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
h1, h2, h3 { text-align: center; color: #2c3e50; }
p { color:#333; line-height:1.4em; }
label, select, input { display:block; width:100%; margin-bottom:1em; font-size:1em; }
button { width:100%; padding:12px; background:#27ae60; color:white; font-size:1.1em; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#219150; }
#result { margin-top:20px; font-size:1.1em; font-weight:bold; text-align:center; }
.small { font-size:0.9em; color:#666; text-align:center; }
.video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius:10px; margin-bottom:20px; }
.video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; }

/* Fix per sfondo nero su mobile e centratura immagini */
img { 
  img { 
  max-width: 100%;
  border-radius: 10px;
  margin: 20px auto;
  background-color: #ffffff !important; /* Forza il bianco assoluto */
  display: block; 
  filter: none !important; /* Impedisce al browser di invertire i colori dell'immagine */
}
}

/* Stile per il selettore lingua */
.lang-selector {
  text-align: right;
  margin-bottom: 15px;
}
.lang-selector select {
  display: inline-block;
  width: auto;
  padding: 5px;
  font-size: 0.9em;
  border-radius: 5px;
  border: 1px solid #ccc;
}
</style>

</head>

<body>
<div class="container">

<div class="lang-selector">
  <select id="language" onchange="changeLanguage()">
    <option value="it">Italiano 🇮🇹</option>
    <option value="en">English 🇬🇧</option>
  </select>
</div>

<img src="logo footly.png" alt="Footly Logo" style="max-width:200px; display:block; margin:0 auto 10px auto;" />

<h1 id="demo-title">Calcola la tua taglia in 1 minuto</h1>
<p id="demo-sub" class="small">Guarda il video, poi usa il misuratore qui sotto.</p>

<div class="video-wrapper">
  <iframe
    src="https://player.vimeo.com/video/1158228058"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<h3>Come prendere le misure</h3>
<img src="example.png" alt="Come misurare il piede" />
<p class="small">Misura entrambi i piedi e inserisci la misura del più lungo.</p>

<hr style="margin:25px 0;">

<h2 id="demo-title-misure">Inserisci le tue misure</h2>

  <label id="lbl-gender">Sesso</label>
  <select id="gender">
    <option id="opt-male" value="male">Uomo</option>
    <option id="opt-female" value="female">Donna</option>
  </select>

  <label id="lbl-length">Lunghezza piede (cm)</label>
  <input type="number" id="foot-length" placeholder="Es: 26.5" step="0.1"/>

  <label id="lbl-width">Larghezza piede (cm)</label>
  <input type="number" id="foot-width" placeholder="Es: 10.2" step="0.1"/>

  <button id="calculate-button" type="button" onclick="calcolaTaglia()">Calcola taglia</button>
  
  <div id="result"></div>

  <p id="note" class="small" style="margin-top:20px;">Servizio offerto da Footly.fit</p>
</div>

<script src="script.js"></script>

</body>
</html>
